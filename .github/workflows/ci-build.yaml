name: ci-build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      helm_app_name:
        required: false
        type: string
    secrets:
      PAT_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      GMAIL_USERNAME:
        required: false
      GMAIL_APP_PASSWORD:
        required: false
      NOTIFY_EMAIL_TO:
        required: false

jobs:
  ci-build:
    name: ci-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Calculate short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Build container image locally
        run: >
          docker buildx build
          --load
          --platform linux/amd64
          --tag ghcr.io/vaultrix-in/${{ inputs.image_name }}:${{ steps.sha.outputs.short_sha }}
          .

      - name: Run Trivy image scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/vaultrix-in/${{ inputs.image_name }}:${{ steps.sha.outputs.short_sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Fail workflow when Trivy finds blocking issues
        if: steps.trivy.outcome == 'failure'
        run: exit 1

      - name: Push image to GHCR
        run: docker push ghcr.io/vaultrix-in/${{ inputs.image_name }}:${{ steps.sha.outputs.short_sha }}

      - name: Checkout Vaultrix-Helm
        uses: actions/checkout@v4
        with:
          repository: Vaultrix-in/Vaultrix-Helm
          token: ${{ secrets.PAT_TOKEN }}
          path: Vaultrix-Helm

      - name: Resolve Helm application name
        id: helm-app
        env:
          HELM_APP_NAME: ${{ inputs.helm_app_name }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          app_name="${HELM_APP_NAME:-$IMAGE_NAME}"
          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"

      - name: Update Helm values-dev image tag
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: >
            yq -i
            '.image.tag = "${{ steps.sha.outputs.short_sha }}"'
            Vaultrix-Helm/apps/${{ steps.helm-app.outputs.app_name }}/values-dev.yaml

      - name: Commit and push Helm image tag update
        working-directory: Vaultrix-Helm
        env:
          APP_NAME: ${{ steps.helm-app.outputs.app_name }}
          IMAGE_TAG: ${{ steps.sha.outputs.short_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/${APP_NAME}/values-dev.yaml"
          if git diff --cached --quiet; then
            echo "No values-dev tag change detected."
            exit 0
          fi
          git commit -m "chore(${APP_NAME}): bump dev image tag to ${IMAGE_TAG}"
          git push origin main

      - name: Notify on failure
        if: failure()
        uses: Vaultrix-in/Vaultrix-CI/.github/actions/notify@feat/ci-workflows
        with:
          status: failed
          pipeline: CI Build
          job_name: ci-build
          docker_image: ghcr.io/vaultrix-in/${{ inputs.image_name }}
          docker_tag: ${{ steps.sha.outputs.short_sha }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username: ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to: ${{ secrets.NOTIFY_EMAIL_TO }}
