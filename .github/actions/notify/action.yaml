name: Notify - Slack and Gmail
description: Universal pipeline notification action for Slack and Gmail

inputs:
  status:
    required: true
    description: "'success' | 'failed'"
  pipeline:
    required: true
    description: Pipeline name shown in the notification
  job_name:
    required: true
    description: 'One of: sonarqube | snyk-sca | docker-build | trivy-scan | docker-push | ci-build | all'
  error_message:
    required: false
    default: Check the GitHub Actions run for details.
  sonar_bugs:
    required: false
    default: N/A
  sonar_vulnerabilities:
    required: false
    default: N/A
  sonar_code_smells:
    required: false
    default: N/A
  sonar_coverage:
    required: false
    default: N/A
  sonar_gate_status:
    required: false
    default: FAILED
  sonar_project_key:
    required: false
    default: N/A
  snyk_critical:
    required: false
    default: N/A
  snyk_high:
    required: false
    default: N/A
  snyk_medium:
    required: false
    default: N/A
  trivy_critical:
    required: false
    default: N/A
  trivy_high:
    required: false
    default: N/A
  docker_image:
    required: false
    default: N/A
  docker_tag:
    required: false
    default: latest
  slack_webhook_url:
    required: true
    description: Slack incoming webhook URL
  gmail_username:
    required: false
    default: ''
  gmail_app_password:
    required: false
    default: ''
  notify_email_to:
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve notification context
      id: ctx
      shell: bash
      run: |
        STATUS="${{ inputs.status }}"
        JOB="${{ inputs.job_name }}"

        if [ "$STATUS" = "success" ]; then
          echo "status_emoji=SUCCESS" >> "$GITHUB_OUTPUT"
          echo "status_label=SUCCEEDED" >> "$GITHUB_OUTPUT"
          echo "color=#2EB67D" >> "$GITHUB_OUTPUT"
        else
          echo "status_emoji=FAILED" >> "$GITHUB_OUTPUT"
          echo "status_label=FAILED" >> "$GITHUB_OUTPUT"
          echo "color=#E01E5A" >> "$GITHUB_OUTPUT"
        fi

        case "$JOB" in
          sonarqube) echo "job_label=SonarQube Scan" >> "$GITHUB_OUTPUT" ;;
          snyk-sca) echo "job_label=Snyk SCA Scan" >> "$GITHUB_OUTPUT" ;;
          docker-build) echo "job_label=Docker Build" >> "$GITHUB_OUTPUT" ;;
          trivy-scan) echo "job_label=Trivy Image Scan" >> "$GITHUB_OUTPUT" ;;
          docker-push) echo "job_label=Docker Push" >> "$GITHUB_OUTPUT" ;;
          ci-build) echo "job_label=CI Build" >> "$GITHUB_OUTPUT" ;;
          all) echo "job_label=All Jobs" >> "$GITHUB_OUTPUT" ;;
          *) echo "job_label=$JOB" >> "$GITHUB_OUTPUT" ;;
        esac

        DETAIL=""
        EMAIL_DETAIL=""

        if [ "$STATUS" = "success" ]; then
          DETAIL="Pipeline completed successfully."
          EMAIL_DETAIL="Pipeline completed successfully."
        else
          case "$JOB" in
            sonarqube)
              DETAIL="SonarQube quality gate failed."
              EMAIL_DETAIL="SonarQube quality gate failed."
              ;;
            snyk-sca)
              DETAIL="Snyk found blocking vulnerabilities."
              EMAIL_DETAIL="Snyk found blocking vulnerabilities."
              ;;
            trivy-scan)
              DETAIL="Trivy found blocking vulnerabilities. Image was not pushed."
              EMAIL_DETAIL="Trivy found blocking vulnerabilities. Image was not pushed."
              ;;
            docker-push)
              DETAIL="Image push to GHCR failed."
              EMAIL_DETAIL="Image push to GHCR failed."
              ;;
            ci-build)
              DETAIL="Build, scan, push, or Helm update failed for ${{ inputs.docker_image }}:${{ inputs.docker_tag }}."
              EMAIL_DETAIL="Build, scan, push, or Helm update failed for ${{ inputs.docker_image }}:${{ inputs.docker_tag }}."
              ;;
            *)
              DETAIL="${{ inputs.error_message }}"
              EMAIL_DETAIL="${{ inputs.error_message }}"
              ;;
          esac
        fi

        DETAIL_ENCODED="${DETAIL//$'\n'/\\n}"
        echo "detail=$DETAIL_ENCODED" >> "$GITHUB_OUTPUT"

        echo "email_detail<<EOF" >> "$GITHUB_OUTPUT"
        echo "$EMAIL_DETAIL" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "${{ steps.ctx.outputs.status_emoji }} PIPELINE ${{ steps.ctx.outputs.status_label }} - ${{ steps.ctx.outputs.job_label }}",
            "attachments": [
              {
                "color": "${{ steps.ctx.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.ctx.outputs.status_emoji }} PIPELINE ${{ steps.ctx.outputs.status_label }} - ${{ steps.ctx.outputs.job_label }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                      { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                      { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                      { "type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>" }
                    ]
                  },
                  { "type": "divider" },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "${{ steps.ctx.outputs.detail }}"
                    }
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

    - name: Send Gmail notification
      if: inputs.gmail_username != '' && inputs.notify_email_to != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ inputs.gmail_username }}
        password: ${{ inputs.gmail_app_password }}
        to: ${{ inputs.notify_email_to }}
        from: GitHub Actions <${{ inputs.gmail_username }}>
        subject: ${{ steps.ctx.outputs.status_emoji }} [${{ inputs.pipeline }}] ${{ steps.ctx.outputs.status_label }} - ${{ steps.ctx.outputs.job_label }} (${{ github.repository }} @ ${{ github.ref_name }})
        body: |
          Pipeline ${{ steps.ctx.outputs.status_label }}: ${{ steps.ctx.outputs.job_label }}

          Repository : ${{ github.repository }}
          Branch     : ${{ github.ref_name }}
          Triggered  : ${{ github.actor }}
          Run        : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ${{ steps.ctx.outputs.email_detail }}
