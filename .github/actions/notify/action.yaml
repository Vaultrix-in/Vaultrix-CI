name: Notify — Slack & Gmail
description: "Universal pipeline notification action for Slack and Gmail"

inputs:
  status:
    required: true
    description: "'success' | 'failed'"
  pipeline:
    required: true
    description: "Pipeline name shown in the notification"
  job_name:
    required: true
    description: "One of: sonarqube | snyk-sca | docker-build | trivy-scan | docker-push | all"
  error_message:
    required: false
    default: "Check the GitHub Actions run for details."
  sonar_bugs:
    required: false
    default: "N/A"
  sonar_vulnerabilities:
    required: false
    default: "N/A"
  sonar_code_smells:
    required: false
    default: "N/A"
  sonar_coverage:
    required: false
    default: "N/A"
  sonar_gate_status:
    required: false
    default: "FAILED"
  sonar_project_key:
    required: false
    default: "N/A"
  snyk_critical:
    required: false
    default: "N/A"
  snyk_high:
    required: false
    default: "N/A"
  snyk_medium:
    required: false
    default: "N/A"
  trivy_critical:
    required: false
    default: "N/A"
  trivy_high:
    required: false
    default: "N/A"
  docker_image:
    required: false
    default: "N/A"
  docker_tag:
    required: false
    default: "latest"
  slack_webhook_url:
    required: true
    description: "Slack incoming webhook URL"
  gmail_username:
    required: false
    default: ""
  gmail_app_password:
    required: false
    default: ""
  notify_email_to:
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Resolve notification context
      id: ctx
      shell: bash
      run: |
        STATUS="${{ inputs.status }}"
        JOB="${{ inputs.job_name }}"

        if [ "$STATUS" = "success" ]; then
          echo "status_emoji=✅" >> $GITHUB_OUTPUT
          echo "status_label=SUCCEEDED" >> $GITHUB_OUTPUT
          echo "color=#2EB67D" >> $GITHUB_OUTPUT
        else
          echo "status_emoji=❌" >> $GITHUB_OUTPUT
          echo "status_label=FAILED" >> $GITHUB_OUTPUT
          echo "color=#E01E5A" >> $GITHUB_OUTPUT
        fi

        case "$JOB" in
          sonarqube) echo "job_label=SonarQube Scan" >> $GITHUB_OUTPUT ;;
          snyk-sca) echo "job_label=Snyk SCA Scan" >> $GITHUB_OUTPUT ;;
          docker-build) echo "job_label=Docker Build" >> $GITHUB_OUTPUT ;;
          trivy-scan) echo "job_label=Trivy Image Scan" >> $GITHUB_OUTPUT ;;
          docker-push) echo "job_label=Docker Push" >> $GITHUB_OUTPUT ;;
          all) echo "job_label=All Jobs" >> $GITHUB_OUTPUT ;;
          *) echo "job_label=$JOB" >> $GITHUB_OUTPUT ;;
        esac

        DETAIL=""
        EMAIL_DETAIL=""

        if [ "$STATUS" = "success" ]; then
          if [ "${{ inputs.pipeline }}" = "CI" ]; then
            DETAIL="✅ SonarQube — Quality Gate Passed\n✅ Snyk — No Critical Vulnerabilities"
            EMAIL_DETAIL="- SonarQube: Quality Gate Passed\n- Snyk: No Critical Vulnerabilities"
          elif [ "${{ inputs.pipeline }}" = "Docker" ]; then
            DETAIL="✅ Docker Build — Success\n✅ Trivy Scan — No Critical CVEs\n✅ Docker Push — Image Published\n\n\`\`\`docker pull ${{ inputs.docker_image }}:${{ inputs.docker_tag }}\`\`\`"
            EMAIL_DETAIL="- Docker Build: Success\n- Trivy Scan: No Critical CVEs\n- Docker Push: Image Published\n\nPull command:\n docker pull ${{ inputs.docker_image }}:${{ inputs.docker_tag }}"
          else
            DETAIL="✅ Pipeline completed successfully."
            EMAIL_DETAIL="Pipeline completed successfully."
          fi
        else
          case "$JOB" in
            sonarqube)
              DETAIL="📊 *SonarQube Report*\n• Bugs: \`${{ inputs.sonar_bugs }}\`\n• Vulnerabilities: \`${{ inputs.sonar_vulnerabilities }}\`\n• Code Smells: \`${{ inputs.sonar_code_smells }}\`\n• Coverage: \`${{ inputs.sonar_coverage }}%\`\n• Quality Gate: ❌ \`${{ inputs.sonar_gate_status }}\`"
              EMAIL_DETAIL="SonarQube Report:\n Bugs: ${{ inputs.sonar_bugs }}\n Vulnerabilities: ${{ inputs.sonar_vulnerabilities }}\n Code Smells: ${{ inputs.sonar_code_smells }}\n Coverage: ${{ inputs.sonar_coverage }}%\n Quality Gate: ${{ inputs.sonar_gate_status }}"
              ;;
            snyk-sca)
              DETAIL="🛡️ *Snyk Report*\n• 🔴 Critical CVEs: \`${{ inputs.snyk_critical }}\`\n• 🟠 High CVEs: \`${{ inputs.snyk_high }}\`\n• 🟡 Medium CVEs: \`${{ inputs.snyk_medium }}\`\n\n*Error:*\n\`\`\`${{ inputs.error_message }}\`\`\`"
              EMAIL_DETAIL="Snyk Report:\n Critical CVEs: ${{ inputs.snyk_critical }}\n High CVEs: ${{ inputs.snyk_high }}\n Medium CVEs: ${{ inputs.snyk_medium }}\n\nError:\n ${{ inputs.error_message }}"
              ;;
            docker-build)
              DETAIL="🐳 *Docker Details*\n• Image: \`${{ inputs.docker_image }}:${{ inputs.docker_tag }}\`\n• Dockerfile: \`./Dockerfile\`\n\n*Error:*\n\`\`\`${{ inputs.error_message }}\`\`\`"
              EMAIL_DETAIL="Docker Details:\n Image: ${{ inputs.docker_image }}:${{ inputs.docker_tag }}\n Dockerfile: ./Dockerfile\n\nError:\n ${{ inputs.error_message }}"
              ;;
            trivy-scan)
              DETAIL="🔬 *Trivy Scan Report*\n• Image: \`${{ inputs.docker_image }}:${{ inputs.docker_tag }}\`\n• 🔴 Critical CVEs: \`${{ inputs.trivy_critical }}\`\n• 🟠 High CVEs: \`${{ inputs.trivy_high }}\`\n\n⚠️ Image was *NOT* pushed to Docker Hub"
              EMAIL_DETAIL="Trivy Scan Report:\n Image: ${{ inputs.docker_image }}:${{ inputs.docker_tag }}\n Critical CVEs: ${{ inputs.trivy_critical }}\n High CVEs: ${{ inputs.trivy_high }}\n\nWARNING: Image was NOT pushed to Docker Hub."
              ;;
            docker-push)
              DETAIL="🐳 *Docker Details*\n• Image: \`${{ inputs.docker_image }}:${{ inputs.docker_tag }}\`\n• Target: Docker Hub\n\n*Error:*\n\`\`\`${{ inputs.error_message }}\`\`\`\n\n💡 Check \`DOCKERHUB_USERNAME\` and \`DOCKERHUB_TOKEN\` secrets."
              EMAIL_DETAIL="Docker Push Details:\n Image: ${{ inputs.docker_image }}:${{ inputs.docker_tag }}\n Target: Docker Hub\n\nError:\n ${{ inputs.error_message }}\n\nHint: Check DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
              ;;
            *)
              DETAIL="*Error:*\n\`\`\`${{ inputs.error_message }}\`\`\`"
              EMAIL_DETAIL="Error:\n ${{ inputs.error_message }}"
              ;;
          esac
        fi

        DETAIL_ENCODED="${DETAIL//$'\n'/\\n}"
        echo "detail=$DETAIL_ENCODED" >> $GITHUB_OUTPUT

        EMAIL_DETAIL_REAL="${EMAIL_DETAIL//\\n/$'\n'}"
        echo "email_detail<<EOF_EMAIL_MARKER" >> $GITHUB_OUTPUT
        echo "$EMAIL_DETAIL_REAL" >> $GITHUB_OUTPUT
        echo "EOF_EMAIL_MARKER" >> $GITHUB_OUTPUT

        EXTRA_BUTTONS=""
        case "$JOB" in
          sonarqube) EXTRA_BUTTONS=',{"type":"button","text":{"type":"plain_text","text":"📊 SonarCloud"},"url":"https://sonarcloud.io/dashboard?id=${{ inputs.sonar_project_key }}"}' ;;
          snyk-sca) EXTRA_BUTTONS=',{"type":"button","text":{"type":"plain_text","text":"🛡️ Snyk Dashboard"},"url":"https://app.snyk.io"}' ;;
          trivy-scan) EXTRA_BUTTONS=',{"type":"button","text":{"type":"plain_text","text":"🔬 Security Tab"},"url":"https://github.com/${{ github.repository }}/security/code-scanning"}' ;;
          all) EXTRA_BUTTONS=',{"type":"button","text":{"type":"plain_text","text":"🐳 Docker Hub"},"url":"https://hub.docker.com/r/${{ inputs.docker_image }}"}' ;;
        esac
        echo "extra_buttons=$EXTRA_BUTTONS" >> $GITHUB_OUTPUT

    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "${{ steps.ctx.outputs.status_emoji }} PIPELINE ${{ steps.ctx.outputs.status_label }} — ${{ steps.ctx.outputs.job_label }}",
            "attachments": [
              {
                "color": "${{ steps.ctx.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.ctx.outputs.status_emoji }} PIPELINE ${{ steps.ctx.outputs.status_label }} — ${{ steps.ctx.outputs.job_label }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*📋 Repository:*\n${{ github.repository }}" },
                      { "type": "mrkdwn", "text": "*🌿 Branch:*\n${{ github.ref_name }}" },
                      { "type": "mrkdwn", "text": "*👤 Triggered by:*\n${{ github.actor }}" },
                      { "type": "mrkdwn", "text": "*🔁 Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>" }
                    ]
                  },
                  { "type": "divider" },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "${{ steps.ctx.outputs.detail }}"
                    }
                  },
                  { "type": "divider" },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "🔗 View GitHub Run" },
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                      ${{ steps.ctx.outputs.extra_buttons }}
                    ]
                  },
                  {
                    "type": "context",
                    "elements": [
                      { "type": "mrkdwn", "text": "⏰ ${{ github.event.head_commit.timestamp }}" }
                    ]
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

    - name: Send Gmail notification
      if: inputs.gmail_username != '' && inputs.notify_email_to != ''
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ inputs.gmail_username }}
        password: ${{ inputs.gmail_app_password }}
        to: ${{ inputs.notify_email_to }}
        from: "GitHub Actions <${{ inputs.gmail_username }}>"
        subject: "${{ steps.ctx.outputs.status_emoji }} [${{ inputs.pipeline }}] ${{ steps.ctx.outputs.status_label }} — ${{ steps.ctx.outputs.job_label }} (${{ github.repository }} @ ${{ github.ref_name }})"
        body: |
          Pipeline ${{ steps.ctx.outputs.status_label }}: ${{ steps.ctx.outputs.job_label }}

          Repository : ${{ github.repository }}
          Branch     : ${{ github.ref_name }}
          Triggered  : ${{ github.actor }}
          Run        : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Timestamp  : ${{ github.event.head_commit.timestamp }}

          ${{ steps.ctx.outputs.email_detail }}
        html_body: |
          <!DOCTYPE html>
          <html>
          <body style="font-family:Arial,sans-serif;max-width:600px;margin:auto;padding:24px">
            <div style="background:${{ steps.ctx.outputs.color }};padding:16px 20px;border-radius:6px 6px 0 0;color:#fff;">
              <h2 style="margin:0;font-size:18px">${{ steps.ctx.outputs.status_emoji }} PIPELINE ${{ steps.ctx.outputs.status_label }} — ${{ steps.ctx.outputs.job_label }}</h2>
            </div>
            <div style="background:#f9f9f9;padding:20px;border:1px solid #ddd;border-top:none;">
              <p><strong>📋 Repository:</strong> ${{ github.repository }}</p>
              <p><strong>🌿 Branch:</strong> ${{ github.ref_name }}</p>
              <p><strong>🔁 Run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">#${{ github.run_number }}</a></p>
              <hr>
              <pre style="background:#fff;padding:14px;border:1px solid #ddd;">${{ steps.ctx.outputs.email_detail }}</pre>
            </div>
          </body>
          </html>\n